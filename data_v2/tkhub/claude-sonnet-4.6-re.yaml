    prompt: What comes next in this sequence? Explain the pattern. 2, 6, 12, 20, 30,
      ?
    response: '## The Answer is **42**


      ### The Pattern


      Each number is the product of two consecutive integers:


      | Term | Calculation | Result |

      |------|-------------|--------|

      | 1st | 1 × 2 | 2 |

      | 2nd | 2 × 3 | 6 |

      | 3rd | 3 × 4 | 12 |

      | 4th | 4 × 5 | 20 |

      | 5th | 5 × 6 | 30 |

      | **6th** | **6 × 7** | **42** |


      ### Alternative Way to See It


      You can also notice the **differences between terms** are increasing by 2 each
      time:

      - 6 - 2 = **4**

      - 12 - 6 = **6**

      - 20 - 12 = **8**

      - 30 - 20 = **10**

      - **42 - 30 = 12** ✓


      These are called **pronic numbers** (or oblong numbers), expressed as **n(n+1)**.'
