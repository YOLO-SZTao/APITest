    prompt: What comes next in this sequence? Explain the pattern. 2, 6, 12, 20, 30,
      ?
    response: '# Finding the Next Number in the Sequence


      ## The Answer: **42**


      ## The Pattern


      Let me show this a few ways:


      **Looking at the differences between consecutive terms:**

      - 6 - 2 = 4

      - 12 - 6 = 6

      - 20 - 12 = 8

      - 30 - 20 = 10

      - ? - 30 = **12**


      The differences increase by 2 each time, so the next term is 30 + 12 = **42**.


      **As a formula:**


      Each term is **n × (n + 1)**, where n = 1, 2, 3, ...


      | n | n × (n+1) | Result |

      |---|-----------|--------|

      | 1 | 1 × 2 | 2 |

      | 2 | 2 × 3 | 6 |

      | 3 | 3 × 4 | 12 |

      | 4 | 4 × 5 | 20 |

      | 5 | 5 × 6 | 30 |

      | 6 | 6 × 7 | **42** |


      These are known as the **pronic numbers** (or oblong numbers) — they represent
      the area of a rectangle with sides of consecutive integers.'
