    response: '# Next Number: **42**


      ## The Pattern


      Each term follows the formula **n(n+1)**, where n starts at 1:


      | n | n(n+1) | Term |

      |---|--------|------|

      | 1 | 1×2 | 2 |

      | 2 | 2×3 | 6 |

      | 3 | 3×4 | 12 |

      | 4 | 4×5 | 20 |

      | 5 | 5×6 | 30 |

      | 6 | 6×7 | **42** |


      ## Another Way to See It


      Look at the **differences between consecutive terms**:


      - 6 − 2 = **4**

      - 12 − 6 = **6**

      - 20 − 12 = **8**

      - 30 − 20 = **10**

      - ? − 30 = **12** → so ? = **42**


      The differences increase by 2 each time (consecutive even numbers), confirming
      the next term is **42**.


      These numbers are also known as **pronic numbers** (products of two consecutive
      integers).'
